[package]
name = "dotnet"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[lib]
name = "braillify_native"
crate-type = ["cdylib", "rlib"]

[dependencies]
# UEB Grade-2 English (CMUdict + hyphenation) is a base dependency, included even
# with default-features disabled.
braillify = { path = "../../libs/braillify", default-features = false }
