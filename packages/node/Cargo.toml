[package]
name = "node"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors = ["owjs3901 <owjs3901@gmail.com>"]

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["console_error_panic_hook"]

[dependencies]
wasm-bindgen = "0.2.122"
braillify = { path = "../../libs/braillify", default-features = false, features = [
    "wasm",
] }

# The `console_error_panic_hook` crate provides better debugging of panics by
# logging them with `console.error`. This is great for development, but requires
# all the `std::fmt` and `std::panicking` infrastructure, so isn't great for
# code size when deploying.
console_error_panic_hook = { version = "0.1.7", optional = true }

[dev-dependencies]
wasm-bindgen-test = "0.3.72"

# Disable wasm-pack's bundled (legacy) wasm-opt; the bundled version does not
# support bulk-memory ops emitted by modern rustc. The `build` script in
# package.json runs an up-to-date `wasm-opt` (from the `binaryen` npm devDep)
# after `wasm-pack`. Bun's script runner adds `node_modules/.bin` to PATH.
[package.metadata.wasm-pack.profile.release]
wasm-opt = false

